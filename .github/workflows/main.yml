name: Build & Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      
      - name: Checkout repository
        uses: actions/checkout@v3

     
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

     
      - name: Install dependencies
        run: npm install

    
      - name: Build Angular project
        run: npx ng build --configuration production --output-path=dist/projeto-pi-precificacao --base-href=/projeto-pi-precificacao/

     
      - name: Copy index.html to 404.html
        run: cp dist/projeto-pi-precificacao/index.html dist/projeto-pi-precificacao/404.html

     
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAT }}          
          publish_dir: ./dist/projeto-pi-precificacao 
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          force_orphan: true
          keep_files: false
